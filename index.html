<!DOCTYPE html>
<html lang="ja">
<head>
<title>穴森神社の洞窟</title>
<!-- ===== 著作権・ライセンス表示 ===== -->
<meta name="copyright" content="© 2026 All Rights Reserved. This VR tour map is protected by copyright law.">

<meta name="license" content="Proprietary - Unauthorized reproduction, copying, and commercial use are prohibited.">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html { width: 100%; height: 100%; overflow: hidden; background: #222; }
.map-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #222; }
.map-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.text-overlay { position: absolute; top: 50%; transform: translateY(-50%); left: 0; right: 0; z-index: 100; padding: 0 20px; pointer-events: none; text-align: left; }
.overlay-title { font-size: 38px; color: #ff661c; font-weight: bold; font-family: 'Yu Mincho','YuMincho','Hiragino Mincho ProN',serif; text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.76), 0 0 30px rgba(0,0,0,0.57), 0 0 40px rgba(0,0,0,0.38); margin-bottom: 12px; }
.overlay-desc { font-size: 22px; color: #ffff80; white-space: pre-wrap; font-family: 'Yu Mincho','YuMincho','Hiragino Mincho ProN',serif; line-height: 1.6; text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7200000000000001), 0 0 30px rgba(0,0,0,0.54), 0 0 40px rgba(0,0,0,0.36000000000000004); }
.map-pin { position: absolute; transform: translate(-50%, -100%); cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
.map-pin:hover, .map-pin:active { transform: translate(-50%, -100%) scale(1.15); }
.pin-icon { width: 36px; height: 36px; border: 3px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 3px 8px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
.pin-number { transform: rotate(45deg); font-size: 14px; font-weight: bold; color: white; line-height: 1; }
.pin-shadow { width: 10px; height: 5px; background: rgba(0,0,0,0.25); border-radius: 50%; margin-top: 2px; }
.pin-label { background: rgba(255,255,255,0.95); color: #333; font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 4px; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.4); margin-bottom: 4px; pointer-events: none; font-family: sans-serif; }
.compass-container { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.compass-icon { width: 24px; height: 24px; background: rgba(255,255,255,0.95); border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; position: relative; }
.compass-needle { position: absolute; width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 12px solid #e8453c; transform-origin: center 8px; }
.compass-text { background: rgba(255,255,255,0.95); color: #e8453c; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.4); font-family: sans-serif; }
</style>
</head>
<body>
<!-- ===== 著作権表示フッター（ページに表示） ===== -->
<div style="position: fixed; bottom: 5px; right: 10px; font-size: 10px; color: rgba(255,255,255,0.5); pointer-events: none; z-index: 1; font-family: Arial, sans-serif;">
  © 2026 All Rights Reserved
</div>

<div class="map-container">
  <img src="map.jpg" alt="地図" class="map-image">
<div class="text-overlay">
  <div class="overlay-title">穴森神社の洞窟</div>
  <div class="overlay-desc">
大分県竹田市の穴森神社は、平家物語
「緒環伝説」が伝わる神秘の社です。
鳥居を潜れば空気が澄み渡る別世界。
御神体の洞窟には、大蛇と姫の神婚譚が
今も静かに息づいています。</div>
</div>
</div>
<script> var MAP_BOUNDS ={topLeft:{lat:32.867892,lng:131.364235},bottomRight:{lat:32.866338,lng:131.367386}};var PINS = [{lat:32.867425,lng:131.365182,name:'全景と入り口',scene:1,line:'1soto',color:'#a7d3d3',heading:100},{lat:32.867369,lng:131.365659,name:'神護の杉径（すぎみち）',scene:1,line:'2sugibayashi',color:'#00e300'},{lat:32.867236,lng:131.366048,name:'朱門の敷居',scene:1,line:'3akaitorii',color:'#ff0000'},{lat:32.867042,lng:131.366391,name:'清滴の水盤',scene:1,line:'4temizuya',color:'#0080ff'},{lat:32.86663,lng:131.36673,name:'洞口参道（どうこうさんどう）',scene:1,line:'5doukousandou',color:'#8000ff',heading:316},{lat:32.866503,lng:131.366682,name:'洞窟中央の広場',scene:13,line:'5doukousandou',color:'#8000ff'}];function goToScene(pin){var url = './' + pin.line + '/viewer.html?scene=' + pin.scene;console.log('📍 移動先:',url);console.log('📂 ライン:',pin.line,'シーン:',pin.scene);window.location.href = url;}function gpsToPercent(lat,lng){var x = (lng - MAP_BOUNDS.topLeft.lng) / (MAP_BOUNDS.bottomRight.lng - MAP_BOUNDS.topLeft.lng) * 100;var y = (MAP_BOUNDS.topLeft.lat - lat) / (MAP_BOUNDS.topLeft.lat - MAP_BOUNDS.bottomRight.lat) * 100;return{x:x,y:y};}var container = document.querySelector('.map-container');PINS.forEach(function(pin,i){var pos = gpsToPercent(pin.lat,pin.lng);var el = document.createElement('div');el.className = 'map-pin';el.style.left = pos.x + '%';el.style.top = pos.y + '%';var compassHTML = '';if (pin.heading !== undefined && pin.heading !== null && !isNaN(pin.heading)){console.log('🧭 ピン' + (i+1) + ' "' + pin.name + '" にheading=' + pin.heading + '°を設定');compassHTML = '<div class="compass-container"><div class="compass-icon"><div class="compass-needle" style="transform:rotate(' + pin.heading + 'deg);"></div></div><div class="compass-text">' + Math.round(pin.heading) + '°</div></div>';}el.innerHTML = compassHTML + '<div class="pin-label">' + pin.name + '</div><div class="pin-icon" style="background:' + pin.color + ';"><span class="pin-number">' + (i+1) + '</span></div><div class="pin-shadow"></div>';el.addEventListener('click',function(){goToScene(pin);});container.appendChild(el);});console.log('✅ map.html初期化完了 - ピン数:',PINS.length);</script>
</body>
</html>
